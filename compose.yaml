services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1"
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  backend:
    build: ./backend
    ports:
      - "5038:5038"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Server=mssql,1433;Database=OpenPayrun;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;"
      AllowedOrigins__0: "http://localhost:4200"
      Admin__Username: "${ADMIN_USERNAME}"
      Admin__Password: "${ADMIN_PASSWORD}"
      Jwt__Secret: "${JWT_SECRET}"
    depends_on:
      mssql:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "4200:4200"
    environment:
      API_URL: "http://backend:5038"
    depends_on:
      - backend

volumes:
  mssql-data:
