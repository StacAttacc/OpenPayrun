<div class="drawer">
  <input id="nav-drawer" type="checkbox" class="drawer-toggle" />

  <div class="drawer-content flex flex-col h-dvh bg-base-300 overflow-hidden">

    <header class="navbar bg-base-200 border-b border-base-300 sticky top-0 z-30">
      <label for="nav-drawer" class="btn btn-ghost btn-square hidden md:flex drawer-button" [attr.aria-label]="t().nav.openMenu">
        <svg lucideMenu class="h-5 w-5" />
      </label>
      <span class="text-lg font-bold px-2 flex-1">OpenPayrun</span>

      <div class="flex items-center gap-1 mr-2">
        <button class="btn btn-ghost btn-xs font-mono" [class.font-bold]="i18n.lang() === 'en'" (click)="i18n.setLang('en')">EN</button>
        <span class="text-base-content/30 text-xs">|</span>
        <button class="btn btn-ghost btn-xs font-mono" [class.font-bold]="i18n.lang() === 'fr'" (click)="i18n.setLang('fr')">FR</button>
        <span class="text-base-content/30 text-xs">|</span>
        <button class="btn btn-ghost btn-square btn-xs" (click)="theme.toggle()" [attr.aria-label]="theme.theme() === 'light' ? 'Switch to dark mode' : 'Switch to light mode'">
          @if (theme.theme() === 'light') {
            <svg lucideMoon class="h-4 w-4" />
          } @else {
            <svg lucideSun class="h-4 w-4" />
          }
        </button>
      </div>

      @if (auth.isAdmin()) {
        <button class="btn btn-ghost btn-sm gap-1" (click)="logout()">
          <svg lucideLogOut class="h-4 w-4" />
          {{ t().header.logout }}
        </button>
      } @else {
        <button class="btn btn-ghost btn-sm gap-1" (click)="openLogin()">
          <svg lucideLogIn class="h-4 w-4" />
          {{ t().header.login }}
        </button>
      }
    </header>

    <main class="flex-1 p-6 pb-24 md:pb-6 overflow-hidden">
      <router-outlet />
    </main>

    <nav class="dock dock-sm md:hidden z-30" style="padding-bottom: env(safe-area-inset-bottom)">
      <a routerLink="/" routerLinkActive="dock-active" [routerLinkActiveOptions]="{ exact: true }">
        <svg lucideFileText class="h-5 w-5" />
        <span class="dock-label">{{ t().nav.taxRates }}</span>
      </a>
    </nav>

  </div>

  <div class="drawer-side z-40">
    <label for="nav-drawer" aria-label="close sidebar" class="drawer-overlay"></label>
    <aside class="bg-base-200 min-h-screen w-64 flex flex-col">
      <div class="px-6 py-5 font-bold text-xl border-b border-base-300">OpenPayrun</div>
      <ul class="menu menu-lg p-4 gap-1 flex-1">
        <li>
          <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
            <svg lucideFileText class="h-5 w-5" />
            {{ t().nav.taxRates }}
          </a>
        </li>
      </ul>
    </aside>
  </div>

</div>

<app-modal [title]="t().auth.title" [show]="showLoginModal()" (closed)="closeLogin()">
  <div class="form-section">
    <div class="form-grid">
      <label>{{ t().auth.username }}
        <input type="text" [(ngModel)]="creds.username" autocomplete="username" />
      </label>
      <label>{{ t().auth.password }}
        <input type="password" [(ngModel)]="creds.password" autocomplete="current-password" (keydown.enter)="login()" />
      </label>
    </div>
    @if (loginError()) {
      <p class="login-error">{{ t().auth.error }}</p>
    }
  </div>
  <div class="modal-actions">
    <button class="btn-primary modal-btn-grow" (click)="login()">{{ t().auth.submit }}</button>
  </div>
</app-modal>
