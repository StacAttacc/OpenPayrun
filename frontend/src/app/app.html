<div class="drawer">
  <input id="nav-drawer" type="checkbox" class="drawer-toggle" />

  <div class="drawer-content flex flex-col min-h-screen bg-base-300">

    <header class="navbar bg-base-200 border-b border-base-300 sticky top-0 z-30">
      <label for="nav-drawer" class="btn btn-ghost btn-square hidden md:flex drawer-button" aria-label="Open menu">
        <svg lucideMenu class="h-5 w-5" />
      </label>
      <span class="text-lg font-bold px-2 flex-1">OpenPayrun</span>
      @if (auth.isAdmin()) {
        <button class="btn btn-ghost btn-sm gap-1" (click)="logout()">
          <svg lucideLogOut class="h-4 w-4" />
          Logout
        </button>
      } @else {
        <button class="btn btn-ghost btn-sm gap-1" (click)="openLogin()">
          <svg lucideLogIn class="h-4 w-4" />
          Login
        </button>
      }
    </header>

    <main class="flex-1 p-6 pb-24 md:pb-6">
      <router-outlet />
    </main>

    <nav class="btm-nav btm-nav-sm md:hidden z-30">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <svg lucideFileText class="h-5 w-5" />
        <span class="btm-nav-label">Tax Rates</span>
      </a>
    </nav>

  </div>

  <div class="drawer-side z-40">
    <label for="nav-drawer" aria-label="close sidebar" class="drawer-overlay"></label>
    <aside class="bg-base-200 min-h-screen w-64 flex flex-col">
      <div class="px-6 py-5 font-bold text-xl border-b border-base-300">OpenPayrun</div>
      <ul class="menu menu-lg p-4 gap-1 flex-1">
        <li>
          <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
            <svg lucideFileText class="h-5 w-5" />
            Tax Rates
          </a>
        </li>
      </ul>
    </aside>
  </div>

</div>

<app-modal title="Admin Login" [show]="showLoginModal()" (closed)="closeLogin()">
  <div class="form-section">
    <div class="form-grid">
      <label>Username
        <input type="text" [(ngModel)]="creds.username" autocomplete="username" />
      </label>
      <label>Password
        <input type="password" [(ngModel)]="creds.password" autocomplete="current-password" (keydown.enter)="login()" />
      </label>
    </div>
    @if (loginError()) {
      <p class="login-error">Invalid credentials.</p>
    }
  </div>
  <div class="modal-actions">
    <button (click)="closeLogin()">Cancel</button>
    <button class="btn-primary" (click)="login()">Login</button>
  </div>
</app-modal>
