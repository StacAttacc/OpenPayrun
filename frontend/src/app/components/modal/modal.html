@if (show()) {
  <div class="modal-backdrop" (click)="closed.emit()">
    <div class="app-modal" (click)="$event.stopPropagation()">
      <div class="modal-scroll" scrollFade [scrollFadeSkipUp]="true" scrollFadeBottomColor="color-mix(in oklab, var(--color-base-200) 50%, transparent)">
        <h2>{{ title() }}</h2>
        <ng-content />
      </div>
    </div>
  </div>
}
